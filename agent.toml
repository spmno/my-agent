# Agent 运行时配置。
# 供应商直连 DeepSeek API（非 OpenRouter），rig 自带原生 deepseek 客户端。
# API Key 从环境变量 DEEPSEEK_API_KEY 读取。

[provider]
# DeepSeek API 直连（rig 内置客户端），无需手动配置 base_url。
api_key_env = "DEEPSEEK_API_KEY"

[agent]
# 默认模型：deepseek-v4-pro（推理模式）。切换模型用 REPL 命令：model <slug>
default_model = "deepseek-v4-pro"
# 自主循环上限：agent 最多执行的轮数。
max_turns = 20

# 各角色选择自己的模型与提示词文件。可用 REPL 命令 model <slug> 全局覆盖。
# 按工具的 HITL（人在环）权限分级：
#   allow = 自动执行不询问；ask = 暂停请人类确认；deny = 拦截调用并说明原因。
#   read_file / run_bash_readonly 默认自动执行（如 ls, cat, git status）；
#   run_bash_mutating / edit_file 默认需询问。
[agents.orchestrator]
model = "deepseek-v4-pro"
preamble = "AGENTS.md"
permissions.read_file = "allow"
permissions.run_bash_readonly = "allow"
permissions.run_bash_mutating = "deny"
permissions.edit_file = "deny"

[agents.planner]
model = "deepseek-v4-pro"
preamble = "prompts/planner.md"
permissions.read_file = "allow"
permissions.run_bash_readonly = "allow"
permissions.run_bash_mutating = "deny"
permissions.edit_file = "deny"

[agents.builder]
model = "deepseek-v4-pro"
preamble = "prompts/builder.md"
permissions.read_file = "allow"
permissions.run_bash_readonly = "allow"
permissions.run_bash_mutating = "ask"
permissions.edit_file = "allow"

[agents.auditor]
model = "deepseek-v4-pro"
preamble = "prompts/auditor.md"
permissions.read_file = "allow"
permissions.run_bash_readonly = "allow"
permissions.run_bash_mutating = "deny"
permissions.edit_file = "deny"

[memory]
# JSONL 记忆存储（v1），可扩展为 sqlite。
dir = "memory"
conversation_file = "conversations.jsonl"
lessons_file = "lessons.jsonl"
rules_file = "rules.json"

[evolution]
# 自动学习式规则提升：被观察到 >= 阈值次数的规则会被提升到 AGENTS.md。
rule_escalation_threshold = 3
