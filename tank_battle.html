<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #555;
    box-shadow: 0 0 40px rgba(0,180,0,0.3);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ==================== 坦克大战 - 完整实现 ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- 常量 ----
const CELL_SIZE = 32;
const MAP_COLS = 13;
const MAP_ROWS = 13;
const MAP_W = MAP_COLS * CELL_SIZE;
const MAP_H = MAP_ROWS * CELL_SIZE;
const UI_HEIGHT = 56;
const CANVAS_W = MAP_W;
const CANVAS_H = MAP_H + UI_HEIGHT;
const MAP_OFFSET_X = 0;
const MAP_OFFSET_Y = UI_HEIGHT;

canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// 地图元素类型
const EMPTY = 0;
const BRICK = 1;
const STEEL = 2;
const GRASS = 3;
const WATER = 4;
const BASE  = 5;

// 方向
const DIR_UP = 0;
const DIR_RIGHT = 1;
const DIR_DOWN = 2;
const DIR_LEFT = 3;

// 游戏状态
const STATE_MENU = 'menu';
const STATE_PLAYING = 'playing';
const STATE_PAUSED = 'paused';
const STATE_LEVEL_CLEAR = 'level_clear';
const STATE_GAME_OVER = 'game_over';
const STATE_VICTORY = 'victory';

// ---- 音效引擎 (简易 Web Audio) ----
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playBeep(freq, duration, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  } catch(e) {}
}
function sfxShoot() { playBeep(600, 0.08, 'square', 0.05); }
function sfxHit() { playBeep(120, 0.15, 'square', 0.07); }
function sfxExplode() { playBeep(50, 0.3, 'sawtooth', 0.1); }
function sfxPowerUp() { playBeep(900, 0.1, 'square', 0.06); playBeep(1200, 0.1, 'square', 0.06); }
function sfxGameOver() { playBeep(200, 0.2, 'sawtooth', 0.1); playBeep(100, 0.4, 'sawtooth', 0.12); }
function sfxLevelClear() { playBeep(400, 0.1, 'square', 0.06); playBeep(600, 0.1, 'square', 0.06); playBeep(800, 0.15, 'square', 0.07); }

// ---- 输入处理 ----
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  keys[e.code] = false;
  e.preventDefault();
});

// ---- 粒子系统 ----
class Particle {
  constructor(x, y, color, life = 20) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = (Math.random() - 0.5) * 4;
    this.life = life;
    this.maxLife = life;
    this.color = color;
    this.size = 2 + Math.random() * 3;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(Math.round(this.x), Math.round(this.y), this.size, this.size);
    ctx.globalAlpha = 1;
  }
  get alive() { return this.life > 0; }
}

let particles = [];
function spawnExplosion(x, y, count = 15) {
  const colors = ['#ff4400', '#ffaa00', '#ffcc00', '#ffffff', '#ff6600'];
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], 15 + Math.floor(Math.random() * 15)));
  }
}
function spawnSmallExplosion(x, y, count = 6) {
  const colors = ['#ffaa00', '#ffcc00', '#ffffff'];
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)], 8 + Math.floor(Math.random() * 8)));
  }
}

// ---- 道具类型 ----
const POWERUP_TYPES = {
  EXTRA_LIFE: { name: '生命+1', color: '#ff4466', icon: '♥', duration: 12 },
  POWER_SHOT: { name: '威力强化', color: '#ffaa00', icon: '★', duration: 15 },
  CLEAR_SCREEN: { name: '全屏清除', color: '#44ddff', icon: '⚡', duration: 10 },
  FREEZE: { name: '冻结敌军', color: '#88ccff', icon: '❄', duration: 10 },
  BASE_ARMOR: { name: '基地保护', color: '#44ff44', icon: '🛡', duration: 10 },
};

// ---- 道具类 ----
class PowerUp {
  constructor(x, y, typeKey) {
    this.x = x;
    this.y = y;
    this.typeKey = typeKey;
    this.type = POWERUP_TYPES[typeKey];
    this.life = this.type.duration * 60; // 帧数
    this.blinkTimer = 0;
    this.collected = false;
  }
  update() {
    this.life--;
    this.blinkTimer++;
  }
  draw(ctx) {
    if (this.collected) return;
    const blink = this.life < 180 ? (this.blinkTimer % 20 < 10) : (this.blinkTimer % 40 < 30);
    if (!blink && this.life < 180) return; // 快速闪烁时短暂消失
    if (!blink && this.life >= 180) { /* 慢闪烁保持显示 */ }
    // 始终显示，但在快过期时改变亮度
    const alpha = this.life < 180 ? (0.5 + 0.5 * Math.sin(this.blinkTimer * 0.5)) : 1;
    const cx = this.x + CELL_SIZE / 2;
    const cy = this.y + CELL_SIZE / 2;
    ctx.globalAlpha = alpha;
    // 背景光晕
    ctx.fillStyle = this.type.color;
    ctx.fillRect(this.x + 2, this.y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
    // 边框
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(this.x + 4, this.y + 4, CELL_SIZE - 8, CELL_SIZE - 8);
    // 图标
    ctx.fillStyle = '#000';
    ctx.font = 'bold 18px "Courier New"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.type.icon, cx, cy);
    ctx.textAlign = 'start';
    ctx.textBaseline = 'alphabetic';
    ctx.globalAlpha = 1;
  }
  get expired() { return this.life <= 0; }
}

// ---- 子弹类 ----
class Bullet {
  constructor(x, y, dir, speed, isPlayer = false, canBreakSteel = false) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.speed = speed;
    this.isPlayer = isPlayer;
    this.canBreakSteel = canBreakSteel;
    this.alive = true;
    this.size = 5;
  }
  update() {
    switch (this.dir) {
      case DIR_UP:    this.y -= this.speed; break;
      case DIR_DOWN:  this.y += this.speed; break;
      case DIR_LEFT:  this.x -= this.speed; break;
      case DIR_RIGHT: this.x += this.speed; break;
    }
    // 检查是否超出地图边界
    if (this.x < MAP_OFFSET_X - 4 || this.x > MAP_OFFSET_X + MAP_W + 4 ||
        this.y < MAP_OFFSET_Y - 4 || this.y > MAP_OFFSET_Y + MAP_H + 4) {
      this.alive = false;
    }
  }
  draw(ctx) {
    if (!this.alive) return;
    ctx.fillStyle = this.isPlayer ? '#ffdd44' : '#ff6644';
    const s = this.size;
    ctx.fillRect(Math.round(this.x - s/2), Math.round(this.y - s/2), s, s);
    // 拖尾
    ctx.fillStyle = this.isPlayer ? '#ffaa00' : '#cc3300';
    ctx.fillRect(Math.round(this.x - s/4), Math.round(this.y - s/4), s/2, s/2);
  }
  getBounds() {
    const s = this.size;
    return { left: this.x - s/2, right: this.x + s/2, top: this.y - s/2, bottom: this.y + s/2 };
  }
}

// ---- 坦克类 ----
class Tank {
  constructor(x, y, dir, color, speed, isPlayer = false, hp = 1, tankType = 'normal') {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.speed = speed;
    this.isPlayer = isPlayer;
    this.hp = hp;
    this.maxHp = hp;
    this.tankType = tankType; // 'normal' | 'fast' | 'heavy'
    this.alive = true;
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 30 : (tankType === 'fast' ? 40 : (tankType === 'heavy' ? 80 : 55));
    this.trackOffset = 0; // 履带动画偏移
    this.spawnInvincible = isPlayer ? 0 : 90; // 出生无敌帧
    this.frozen = false;
    this.frozenTimer = 0;
    this.aiDirTimer = 0;
    this.aiDirChangeInterval = 60 + Math.floor(Math.random() * 80);
    this.size = CELL_SIZE - 4; // 坦克大小
  }
  update(map, playerTank) {
    if (!this.alive) return;
    if (this.spawnInvincible > 0) this.spawnInvincible--;
    if (this.frozen) {
      this.frozenTimer--;
      if (this.frozenTimer <= 0) this.frozen = false;
      // 冻结时也更新履带动画（静止）
      return;
    }
    if (this.shootCooldown > 0) this.shootCooldown--;
    this.trackOffset = (this.trackOffset + 1) % 8;
  }
  draw(ctx) {
    if (!this.alive) return;
    // 出生无敌闪烁
    if (this.spawnInvincible > 0 && Math.floor(this.spawnInvincible / 6) % 2 === 0) return;

    const cx = this.x + this.size / 2;
    const cy = this.y + this.size / 2;
    const s = this.size;
    const half = s / 2;

    ctx.save();
    ctx.translate(cx, cy);
    const angle = [0, Math.PI/2, Math.PI, -Math.PI/2][this.dir];
    ctx.rotate(angle);

    // 履带 - 两条深色条
    const trackW = 5;
    const trackAnim = this.frozen ? 0 : this.trackOffset;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-half, -half, s, trackW); // 上履带
    ctx.fillRect(-half, half - trackW, s, trackW); // 下履带

    // 履带纹理
    ctx.fillStyle = '#2a2a2a';
    for (let i = -3; i <= 3; i++) {
      const segX = i * (s / 7) + trackAnim % (s / 7);
      ctx.fillRect(segX - 2, -half, 3, trackW);
      ctx.fillRect(segX - 2, half - trackW, 3, trackW);
    }

    // 车体
    const bodyColor = this.frozen ? '#88ccff' : this.color;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-half + 4, -half + trackW, s - 8, s - trackW * 2);

    // 车体高光
    const lightColor = this.frozen ? '#aaddff' : this.lightenColor(bodyColor, 0.3);
    ctx.fillStyle = lightColor;
    ctx.fillRect(-half + 5, -half + trackW, s - 10, 4);

    // 炮塔底座
    ctx.fillStyle = this.frozen ? '#6699cc' : this.darkenColor(bodyColor, 0.3);
    ctx.fillRect(-6, -6, 12, 12);

    // 炮管
    ctx.fillStyle = this.frozen ? '#5588bb' : this.darkenColor(bodyColor, 0.5);
    ctx.fillRect(-2, -half - 2, 4, half - 4);

    // 炮管尖端
    ctx.fillStyle = '#111';
    ctx.fillRect(-1.5, -half - 4, 3, 5);

    ctx.restore();

    // HP指示器（仅重型坦克）
    if (this.tankType === 'heavy' && this.maxHp > 1) {
      const hpW = s;
      const hpH = 3;
      const hpY = this.y - 6;
      ctx.fillStyle = '#333';
      ctx.fillRect(this.x, hpY, hpW, hpH);
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(this.x, hpY, hpW * (this.hp / this.maxHp), hpH);
    }
  }
  lightenColor(hex, factor) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    const lr = Math.min(255, Math.round(r + (255 - r) * factor));
    const lg = Math.min(255, Math.round(g + (255 - g) * factor));
    const lb = Math.min(255, Math.round(b + (255 - b) * factor));
    return '#' + [lr, lg, lb].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  darkenColor(hex, factor) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    const dr = Math.max(0, Math.round(r * (1 - factor)));
    const dg = Math.max(0, Math.round(g * (1 - factor)));
    const db = Math.max(0, Math.round(b * (1 - factor)));
    return '#' + [dr, dg, db].map(v => v.toString(16).padStart(2,'0')).join('');
  }
  getBounds() {
    return {
      left: this.x + 2,
      right: this.x + this.size - 2,
      top: this.y + 2,
      bottom: this.y + this.size - 2,
    };
  }
  getCenter() {
    return { x: this.x + this.size / 2, y: this.y + this.size / 2 };
  }
  move(dir, map, otherTanks) {
    if (!this.alive || this.frozen) return false;
    this.dir = dir;
    let newX = this.x;
    let newY = this.y;
    const step = this.speed;
    switch (dir) {
      case DIR_UP:    newY -= step; break;
      case DIR_DOWN:  newY += step; break;
      case DIR_LEFT:  newX -= step; break;
      case DIR_RIGHT: newX += step; break;
    }
    // 边界检查
    if (newX < MAP_OFFSET_X) newX = MAP_OFFSET_X;
    if (newY < MAP_OFFSET_Y) newY = MAP_OFFSET_Y;
    if (newX + this.size > MAP_OFFSET_X + MAP_W) newX = MAP_OFFSET_X + MAP_W - this.size;
    if (newY + this.size > MAP_OFFSET_Y + MAP_H) newY = MAP_OFFSET_Y + MAP_H - this.size;

    // 碰撞检测 - 地图
    const testBounds = {
      left: newX + 2,
      right: newX + this.size - 2,
      top: newY + 2,
      bottom: newY + this.size - 2,
    };
    if (map.collidesWithWall(testBounds, this.isPlayer)) {
      // 微调：尝试只在单轴移动
      if (dir === DIR_UP || dir === DIR_DOWN) {
        // 尝试左微调
        for (let adj = -3; adj <= 3; adj += 1.5) {
          const adjBounds = { ...testBounds, left: testBounds.left + adj, right: testBounds.right + adj };
          if (!map.collidesWithWall(adjBounds, this.isPlayer)) {
            newX += adj;
            break;
          }
        }
      } else {
        for (let adj = -3; adj <= 3; adj += 1.5) {
          const adjBounds = { ...testBounds, top: testBounds.top + adj, bottom: testBounds.bottom + adj };
          if (!map.collidesWithWall(adjBounds, this.isPlayer)) {
            newY += adj;
            break;
          }
        }
      }
      // 再次检查
      const adjustedBounds = {
        left: newX + 2,
        right: newX + this.size - 2,
        top: newY + 2,
        bottom: newY + this.size - 2,
      };
      if (map.collidesWithWall(adjustedBounds, this.isPlayer)) {
        return false; // 无法移动
      }
    }

    // 碰撞检测 - 其他坦克
    for (const other of otherTanks) {
      if (other === this || !other.alive) continue;
      const adjustedBounds = {
        left: newX + 2,
        right: newX + this.size - 2,
        top: newY + 2,
        bottom: newY + this.size - 2,
      };
      if (this.boundsOverlap(adjustedBounds, other.getBounds())) {
        return false;
      }
    }

    // 也不能与玩家坦克重叠（敌方检查）
    this.x = newX;
    this.y = newY;
    return true;
  }
  boundsOverlap(a, b) {
    return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);
  }
  shoot(bullets, canBreakSteel = false) {
    if (!this.alive || this.frozen) return null;
    if (this.shootCooldown > 0) return null;
    this.shootCooldown = this.shootDelay;
    const center = this.getCenter();
    const bulletSpeed = this.isPlayer ? 6 : 4;
    const bullet = new Bullet(center.x, center.y, this.dir, bulletSpeed, this.isPlayer, canBreakSteel);
    bullets.push(bullet);
    return bullet;
  }
  takeDamage(map) {
    if (this.spawnInvincible > 0) return false;
    this.hp--;
    if (this.hp <= 0) {
      this.alive = false;
      const center = this.getCenter();
      spawnExplosion(center.x, center.y, 20);
      sfxExplode();
      return true; // 被摧毁
    }
    // 受伤闪烁
    spawnSmallExplosion(this.getCenter().x, this.getCenter().y, 8);
    sfxHit();
    return false;
  }
}

// ---- 地图类 ----
class Map {
  constructor(layout) {
    // layout: 13x13 array
    this.grid = layout.map(row => [...row]);
    this.fortifiedCells = new Set(); // 临时强化的格子 "row,col"
    this.fortifyTimer = 0;
  }
  getCell(row, col) {
    if (row < 0 || row >= MAP_ROWS || col < 0 || col >= MAP_COLS) return STEEL; // 边界为钢墙
    const key = `${row},${col}`;
    if (this.fortifiedCells.has(key)) return STEEL;
    return this.grid[row][col];
  }
  setCell(row, col, value) {
    if (row >= 0 && row < MAP_ROWS && col >= 0 && col < MAP_COLS) {
      this.grid[row][col] = value;
    }
  }
  fortifyBase() {
    // 寻找基地周围的砖墙并强化
    let baseR = -1, baseC = -1;
    for (let r = 0; r < MAP_ROWS; r++) {
      for (let c = 0; c < MAP_COLS; c++) {
        if (this.grid[r][c] === BASE) { baseR = r; baseC = c; break; }
      }
    }
    if (baseR < 0) return;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = baseR + dr;
        const nc = baseC + dc;
        if (nr >= 0 && nr < MAP_ROWS && nc >= 0 && nc < MAP_COLS) {
          if (this.grid[nr][nc] === BRICK) {
            this.fortifiedCells.add(`${nr},${nc}`);
          }
        }
      }
    }
    // 同时也强化基地上方两格范围内的砖墙
    for (let dr = -2; dr <= -1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const nr = baseR + dr;
        const nc = baseC + dc;
        if (nr >= 0 && nr < MAP_ROWS && nc >= 0 && nc < MAP_COLS) {
          if (this.grid[nr][nc] === BRICK) {
            this.fortifiedCells.add(`${nr},${nc}`);
          }
        }
      }
    }
  }
  clearFortify() {
    this.fortifiedCells.clear();
    this.fortifyTimer = 0;
  }
  update() {
    if (this.fortifyTimer > 0) {
      this.fortifyTimer--;
      if (this.fortifyTimer <= 0) {
        this.clearFortify();
      }
    }
  }
  collidesWithWall(bounds, isPlayerTank = false) {
    // 坦克不能穿越钢墙、砖墙、水域。草地可以穿越。
    const leftCol = Math.floor((bounds.left - MAP_OFFSET_X) / CELL_SIZE);
    const rightCol = Math.floor((bounds.right - 1 - MAP_OFFSET_X) / CELL_SIZE);
    const topRow = Math.floor((bounds.top - MAP_OFFSET_Y) / CELL_SIZE);
    const bottomRow = Math.floor((bounds.bottom - 1 - MAP_OFFSET_Y) / CELL_SIZE);

    for (let r = topRow; r <= bottomRow; r++) {
      for (let c = leftCol; c <= rightCol; c++) {
        const cell = this.getCell(r, c);
        if (cell === STEEL || cell === BRICK || cell === WATER || cell === BASE) {
          return true;
        }
        // 基地不能被坦克穿越
      }
    }
    return false;
  }
  checkBulletCollision(bullet) {
    // 返回碰撞结果: null=无碰撞, 'base'=击中基地, 'steel'=击中钢墙, 'brick'=击中砖墙
    const bb = bullet.getBounds();
    const cx = (bb.left + bb.right) / 2;
    const cy = (bb.top + bb.bottom) / 2;
    const col = Math.floor((cx - MAP_OFFSET_X) / CELL_SIZE);
    const row = Math.floor((cy - MAP_OFFSET_Y) / CELL_SIZE);

    if (row < 0 || row >= MAP_ROWS || col < 0 || col >= MAP_COLS) return null;

    const cell = this.getCell(row, col);
    if (cell === BASE) return 'base';
    if (cell === STEEL) return 'steel';
    if (cell === BRICK) return 'brick';
    return null;
  }
  destroyBrick(row, col) {
    if (row >= 0 && row < MAP_ROWS && col >= 0 && col < MAP_COLS) {
      if (this.grid[row][col] === BRICK && !this.fortifiedCells.has(`${row},${col}`)) {
        this.grid[row][col] = EMPTY;
        return true;
      }
    }
    return false;
  }
  draw(ctx, showGrassOverlay = false) {
    for (let r = 0; r < MAP_ROWS; r++) {
      for (let c = 0; c < MAP_COLS; c++) {
        const px = MAP_OFFSET_X + c * CELL_SIZE;
        const py = MAP_OFFSET_Y + r * CELL_SIZE;
        const cell = this.getCell(r, c);

        if (showGrassOverlay) {
          // 仅绘制草地覆盖层
          if (cell === GRASS) {
            this.drawGrassCell(ctx, px, py);
          }
          continue;
        }

        // 绘制地面
        if (cell === EMPTY || cell === GRASS) {
          ctx.fillStyle = '#2a2a1a';
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          // 地面纹理（使用确定性种子）
          const seed = r * 37 + c * 13;
          ctx.fillStyle = '#252515';
          for (let i = 0; i < 4; i++) {
            const dx = px + (i % 2) * 16 + ((seed + i * 7) % 5);
            const dy = py + Math.floor(i / 2) * 16 + ((seed + i * 11) % 5);
            ctx.fillRect(dx, dy, 2, 2);
          }
        } else if (cell === WATER) {
          ctx.fillStyle = '#1a3a8a';
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          // 水波纹
          ctx.fillStyle = '#2255cc';
          const waveOffset = (Math.floor(Date.now() / 300) + r + c) % 4;
          for (let w = 0; w < 3; w++) {
            ctx.fillRect(px + 4, py + 4 + w * 10 + waveOffset * 2, CELL_SIZE - 8, 3);
          }
        }

        // 绘制墙壁
        if (cell === BRICK) {
          ctx.fillStyle = '#b8500a';
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          // 砖块纹理
          ctx.fillStyle = '#8a3800';
          ctx.fillRect(px, py, CELL_SIZE, 1);
          ctx.fillRect(px, py + CELL_SIZE / 2, CELL_SIZE, 1);
          ctx.fillRect(px + CELL_SIZE / 2, py, 1, CELL_SIZE / 2);
          ctx.fillRect(px + CELL_SIZE / 4, py + CELL_SIZE / 2, 1, CELL_SIZE / 2);
          ctx.fillRect(px + 3 * CELL_SIZE / 4, py + CELL_SIZE / 2, 1, CELL_SIZE / 2);
          ctx.fillStyle = '#d4601a';
          ctx.fillRect(px + 2, py + 2, CELL_SIZE - 4, CELL_SIZE / 2 - 3);
          ctx.fillRect(px + 2, py + CELL_SIZE / 2 + 2, CELL_SIZE / 2 - 4, CELL_SIZE / 2 - 3);
          ctx.fillRect(px + CELL_SIZE / 2 + 2, py + CELL_SIZE / 2 + 2, CELL_SIZE / 2 - 4, CELL_SIZE / 2 - 3);
        } else if (cell === STEEL) {
          ctx.fillStyle = '#7a7a8a';
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          ctx.fillStyle = '#9a9aaa';
          ctx.fillRect(px + 2, py + 2, CELL_SIZE - 4, CELL_SIZE - 4);
          ctx.fillStyle = '#bbbbcc';
          ctx.fillRect(px + 4, py + 4, CELL_SIZE - 8, CELL_SIZE - 8);
          // 铆钉
          ctx.fillStyle = '#555';
          ctx.fillRect(px + 2, py + 2, 3, 3);
          ctx.fillRect(px + CELL_SIZE - 5, py + 2, 3, 3);
          ctx.fillRect(px + 2, py + CELL_SIZE - 5, 3, 3);
          ctx.fillRect(px + CELL_SIZE - 5, py + CELL_SIZE - 5, 3, 3);
        } else if (cell === BASE) {
          // 基地地面
          ctx.fillStyle = '#333322';
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          // 老鹰标志（像素风格）
          this.drawEagle(ctx, px, py);
        }

        if (cell === GRASS && !showGrassOverlay) {
          // 在地面层也画草地底色
          ctx.fillStyle = '#2a5a1a';
          ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
        }
      }
    }
  }
  drawGrassCell(ctx, px, py) {
    // 草地覆盖层 - 绘制在坦克上方
    ctx.fillStyle = '#3a7a2a';
    ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
    // 草丛纹理
    ctx.fillStyle = '#2a6a1a';
    for (let i = 0; i < 8; i++) {
      const gx = px + (i * 5 + 3) % CELL_SIZE;
      const gy = py + (i * 7 + 2) % CELL_SIZE;
      ctx.fillRect(gx, gy, 3, 6);
    }
    ctx.fillStyle = '#4a8a3a';
    for (let i = 0; i < 5; i++) {
      const gx = px + (i * 8 + 1) % CELL_SIZE;
      const gy = py + (i * 10 + 5) % CELL_SIZE;
      ctx.fillRect(gx, gy, 2, 8);
    }
  }
  drawEagle(ctx, px, py) {
    const cx = px + CELL_SIZE / 2;
    const cy = py + CELL_SIZE / 2;
    // 简化老鹰像素图案
    ctx.fillStyle = '#ffcc00';
    // 身体
    ctx.fillRect(cx - 6, cy - 8, 12, 14);
    // 头部
    ctx.fillRect(cx - 3, cy - 12, 6, 5);
    // 翅膀
    ctx.fillRect(cx - 10, cy - 4, 4, 8);
    ctx.fillRect(cx + 6, cy - 4, 4, 8);
    // 眼睛
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 2, cy - 10, 2, 2);
    ctx.fillRect(cx + 1, cy - 10, 2, 2);
    // 喙
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(cx - 1, cy - 7, 3, 2);
    // 底座
    ctx.fillStyle = '#cc9900';
    ctx.fillRect(cx - 8, cy + 6, 16, 3);
  }
  getBasePosition() {
    for (let r = 0; r < MAP_ROWS; r++) {
      for (let c = 0; c < MAP_COLS; c++) {
        if (this.grid[r][c] === BASE) return { row: r, col: c };
      }
    }
    return { row: MAP_ROWS - 1, col: Math.floor(MAP_COLS / 2) };
  }
}

// ---- 关卡数据 ----
function generateLevelLayout(level) {
  // 创建13x13空地图
  const grid = Array.from({ length: MAP_ROWS }, () => Array(MAP_COLS).fill(EMPTY));

  // 底部基地
  const baseCol = Math.floor(MAP_COLS / 2);
  const baseRow = MAP_ROWS - 1;
  grid[baseRow][baseCol] = BASE;

  // 基地周围的保护砖墙
  if (baseRow - 1 >= 0) {
    grid[baseRow - 1][baseCol - 1] = BRICK;
    grid[baseRow - 1][baseCol] = BRICK;
    grid[baseRow - 1][baseCol + 1] = BRICK;
  }
  grid[baseRow][baseCol - 1] = BRICK;
  grid[baseRow][baseCol + 1] = BRICK;

  // 不同关卡的布局
  switch (level) {
    case 1:
      // 简单布局 - 少量砖墙
      for (let r = 2; r <= 8; r += 2) {
        for (let c = 1; c < MAP_COLS - 1; c += 3) {
          if (!(r >= baseRow - 2 && Math.abs(c - baseCol) <= 2)) {
            grid[r][c] = BRICK;
          }
        }
      }
      // 一些钢墙
      grid[3][5] = STEEL;
      grid[3][7] = STEEL;
      grid[7][5] = STEEL;
      grid[7][7] = STEEL;
      break;

    case 2:
      // 更多砖墙和钢墙
      for (let r = 1; r <= 9; r += 2) {
        for (let c = 0; c < MAP_COLS; c += 2) {
          if (!(r >= baseRow - 2 && Math.abs(c - baseCol) <= 2)) {
            grid[r][c] = (r + c) % 5 === 0 ? STEEL : BRICK;
          }
        }
      }
      // 添加草地
      for (let c = 3; c <= 9; c += 2) {
        grid[4][c] = GRASS;
        grid[5][c] = GRASS;
      }
      break;

    case 3:
      // 复杂布局
      for (let r = 1; r <= 10; r++) {
        for (let c = 0; c < MAP_COLS; c++) {
          if (r >= baseRow - 2 && Math.abs(c - baseCol) <= 2) continue;
          if (r === 2 && c >= 2 && c <= 10) grid[r][c] = BRICK;
          if (r === 5 && c >= 1 && c <= 11) grid[r][c] = (c % 3 === 0) ? STEEL : BRICK;
          if (r === 8 && c >= 0 && c <= 12) grid[r][c] = (c % 4 === 0) ? STEEL : BRICK;
        }
      }
      // 水域
      grid[3][2] = WATER;
      grid[3][3] = WATER;
      grid[3][9] = WATER;
      grid[3][10] = WATER;
      grid[9][2] = WATER;
      grid[9][10] = WATER;
      // 草地
      for (let c = 5; c <= 7; c++) {
        grid[6][c] = GRASS;
        grid[7][c] = GRASS;
      }
      break;

    case 4:
      // 更难的布局
      for (let r = 1; r <= 10; r++) {
        for (let c = 0; c < MAP_COLS; c++) {
          if (r >= baseRow - 2 && Math.abs(c - baseCol) <= 2) continue;
          if ((r + c) % 2 === 0 && r < 9) {
            grid[r][c] = (r + c) % 6 === 0 ? STEEL : BRICK;
          }
        }
      }
      // 水域障碍
      grid[2][4] = WATER; grid[2][5] = WATER; grid[2][7] = WATER; grid[2][8] = WATER;
      grid[6][0] = WATER; grid[6][1] = WATER;
      grid[6][11] = WATER; grid[6][12] = WATER;
      // 大量草地
      for (let r = 4; r <= 5; r++) {
        for (let c = 3; c <= 9; c++) {
          grid[r][c] = GRASS;
        }
      }
      break;

    case 5:
    default:
      // 最难布局
      for (let r = 1; r <= 10; r++) {
        for (let c = 0; c < MAP_COLS; c++) {
          if (r >= baseRow - 2 && Math.abs(c - baseCol) <= 2) continue;
          if ((r + c) % 3 === 0 && r < 9) {
            grid[r][c] = (r * c) % 7 === 0 ? STEEL : BRICK;
          }
        }
      }
      // 大量钢墙围绕基地远处
      for (let c = 2; c <= 10; c += 2) {
        if (Math.abs(c - baseCol) > 2) grid[9][c] = STEEL;
      }
      // 水域
      grid[2][0] = WATER; grid[2][1] = WATER;
      grid[2][11] = WATER; grid[2][12] = WATER;
      grid[10][0] = WATER; grid[10][12] = WATER;
      // 草地
      for (let r = 3; r <= 4; r++) {
        for (let c = 4; c <= 8; c++) {
          grid[r][c] = GRASS;
        }
      }
      for (let r = 7; r <= 8; r++) {
        for (let c = 1; c <= 11; c += 2) {
          grid[r][c] = GRASS;
        }
      }
      break;
  }

  return grid;
}

function getEnemyConfig(level) {
  // 返回 { total, normal, fast, heavy, maxOnScreen }
  switch (level) {
    case 1: return { total: 8, normal: 6, fast: 2, heavy: 0, maxOnScreen: 3 };
    case 2: return { total: 12, normal: 7, fast: 3, heavy: 2, maxOnScreen: 4 };
    case 3: return { total: 15, normal: 6, fast: 5, heavy: 4, maxOnScreen: 4 };
    case 4: return { total: 18, normal: 7, fast: 5, heavy: 6, maxOnScreen: 4 };
    case 5: return { total: 20, normal: 6, fast: 6, heavy: 8, maxOnScreen: 4 };
    default: return { total: 10 + level * 3, normal: 5, fast: 3 + level, heavy: 2 + level, maxOnScreen: 4 };
  }
}

// ---- 游戏主类 ----
class Game {
  constructor() {
    this.state = STATE_MENU;
    this.level = 1;
    this.maxLevel = 5;
    this.score = 0;
    this.lives = 3;
    this.map = null;
    this.player = null;
    this.enemies = [];
    this.bullets = [];
    this.powerUps = [];
    this.enemyConfig = null;
    this.enemiesSpawned = 0;
    this.enemiesRemaining = 0;
    this.spawnTimer = 0;
    this.spawnDelay = 80;
    this.powerShotActive = false;
    this.powerShotTimer = 0;
    this.freezeTimer = 0;
    this.baseArmorTimer = 0;
    this.levelClearTimer = 0;
    this.gameOverTimer = 0;
    this.screenShake = 0;
    this.frameCount = 0;
    this.messageText = '';
    this.messageTimer = 0;
    this._pWasDown = false;
  }

  startGame() {
    initAudio();
    this.level = 1;
    this.score = 0;
    this.lives = 3;
    this.loadLevel();
    this.state = STATE_PLAYING;
  }

  loadLevel() {
    const layout = generateLevelLayout(this.level);
    this.map = new Map(layout);
    this.enemyConfig = getEnemyConfig(this.level);
    this.enemies = [];
    this.bullets = [];
    this.powerUps = [];
    this.enemiesSpawned = 0;
    this.enemiesRemaining = this.enemyConfig.total;
    this.spawnTimer = 60;
    this.powerShotActive = false;
    this.powerShotTimer = 0;
    this.freezeTimer = 0;
    this.baseArmorTimer = 0;
    this.map.clearFortify();
    this.screenShake = 0;
    this.levelClearTimer = 0;
    this.gameOverTimer = 0;
    this.messageText = '';
    this.messageTimer = 0;

    // 创建玩家坦克 - 在地图底部中央上方
    const basePos = this.map.getBasePosition();
    const playerX = MAP_OFFSET_X + basePos.col * CELL_SIZE + CELL_SIZE / 2 - (CELL_SIZE - 4) / 2;
    const playerY = MAP_OFFSET_Y + (basePos.row - 1) * CELL_SIZE + CELL_SIZE / 2 - (CELL_SIZE - 4) / 2;
    this.player = new Tank(playerX, playerY, DIR_UP, '#ffdd44', 2.0, true, 1, 'normal');
  }

  spawnEnemy() {
    if (this.enemiesSpawned >= this.enemyConfig.total) return null;
    if (this.enemies.filter(e => e.alive).length >= this.enemyConfig.maxOnScreen) return null;

    // 选择出生列（顶部几个位置）
    const spawnCols = [0, Math.floor(MAP_COLS / 2), MAP_COLS - 1];
    // 过滤已被占据的出生点
    const available = spawnCols.filter(c => {
      const sx = MAP_OFFSET_X + c * CELL_SIZE + CELL_SIZE / 2 - (CELL_SIZE - 4) / 2;
      const sy = MAP_OFFSET_Y;
      const bounds = { left: sx + 2, right: sx + CELL_SIZE - 6, top: sy + 2, bottom: sy + CELL_SIZE - 6 };
      // 检查是否与现有敌人重叠
      for (const e of this.enemies) {
        if (e.alive && e.boundsOverlap(bounds, e.getBounds())) return false;
      }
      // 检查地图碰撞
      return !this.map.collidesWithWall(bounds);
    });

    const spawnCol = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : spawnCols[Math.floor(Math.random() * spawnCols.length)];
    const spawnX = MAP_OFFSET_X + spawnCol * CELL_SIZE + CELL_SIZE / 2 - (CELL_SIZE - 4) / 2;
    const spawnY = MAP_OFFSET_Y;

    // 决定类型
    let type = 'normal';
    if (this.enemyConfig.heavy > 0 && Math.random() < 0.35) type = 'heavy';
    else if (this.enemyConfig.fast > 0 && Math.random() < 0.4) type = 'fast';
    // 回退：如果选中的类型配额已用完
    if (type === 'heavy' && this.enemyConfig.heavy <= 0) type = this.enemyConfig.fast > 0 ? 'fast' : 'normal';
    if (type === 'fast' && this.enemyConfig.fast <= 0) type = this.enemyConfig.normal > 0 ? 'normal' : 'heavy';
    if (type === 'normal' && this.enemyConfig.normal <= 0) {
      if (this.enemyConfig.heavy > 0) type = 'heavy';
      else if (this.enemyConfig.fast > 0) type = 'fast';
      else type = 'normal'; // 所有配额用完，继续造普通
    }

    let color, speed, hp;
    switch (type) {
      case 'fast':
        color = '#88ccff';
        speed = 3.2;
        hp = 1;
        break;
      case 'heavy':
        color = '#cc5544';
        speed = 1.2;
        hp = 3;
        break;
      default:
        color = '#aaaaaa';
        speed = 1.8;
        hp = 1;
    }

    // 更新计数
    if (type === 'heavy') this.enemyConfig.heavy = Math.max(0, this.enemyConfig.heavy - 1);
    else if (type === 'fast') this.enemyConfig.fast = Math.max(0, this.enemyConfig.fast - 1);
    else this.enemyConfig.normal = Math.max(0, this.enemyConfig.normal - 1);

    const enemy = new Tank(spawnX, spawnY, DIR_DOWN, color, speed, false, hp, type);
    this.enemies.push(enemy);
    this.enemiesSpawned++;
    return enemy;
  }

  handleBulletWallCollision(bullet) {
    const result = this.map.checkBulletCollision(bullet);
    if (!result) return false;

    const bb = bullet.getBounds();
    const cx = (bb.left + bb.right) / 2;
    const cy = (bb.top + bb.bottom) / 2;
    const col = Math.floor((cx - MAP_OFFSET_X) / CELL_SIZE);
    const row = Math.floor((cy - MAP_OFFSET_Y) / CELL_SIZE);

    if (result === 'base') {
      // 基地被击中 - 游戏失败
      bullet.alive = false;
      spawnExplosion(cx, cy, 30);
      this.onBaseDestroyed();
      return true;
    }

    if (result === 'steel') {
      if (bullet.canBreakSteel) {
        // 强化子弹可以摧毁钢墙（但被强化的基地保护墙也能摧毁）
        const key = `${row},${col}`;
        if (this.map.fortifiedCells.has(key)) {
          this.map.fortifiedCells.delete(key);
          this.map.setCell(row, col, EMPTY);
        } else {
          this.map.setCell(row, col, EMPTY);
        }
        bullet.alive = false;
        spawnSmallExplosion(cx, cy, 10);
        sfxHit();
        return true;
      }
      bullet.alive = false;
      spawnSmallExplosion(cx, cy, 5);
      sfxHit();
      return true;
    }

    if (result === 'brick') {
      bullet.alive = false;
      const destroyed = this.map.destroyBrick(row, col);
      if (destroyed) {
        spawnSmallExplosion(cx, cy, 8);
        sfxHit();
        // 检查是否摧毁了强化墙
        const key = `${row},${col}`;
        this.map.fortifiedCells.delete(key);
      }
      return true;
    }

    return false;
  }

  onBaseDestroyed() {
    this.state = STATE_GAME_OVER;
    this.gameOverTimer = 120;
    this.screenShake = 30;
    this.messageText = '基地被摧毁!';
    this.messageTimer = 120;
    sfxGameOver();
  }

  onPlayerDeath() {
    this.lives--;
    this.screenShake = 15;
    if (this.lives <= 0) {
      this.state = STATE_GAME_OVER;
      this.gameOverTimer = 120;
      this.messageText = '游戏结束';
      this.messageTimer = 120;
      sfxGameOver();
    } else {
      // 重生玩家
      this.messageText = `剩余生命: ${this.lives}`;
      this.messageTimer = 60;
      const basePos = this.map.getBasePosition();
      const playerX = MAP_OFFSET_X + basePos.col * CELL_SIZE + CELL_SIZE / 2 - (CELL_SIZE - 4) / 2;
      const playerY = MAP_OFFSET_Y + (basePos.row - 1) * CELL_SIZE + CELL_SIZE / 2 - (CELL_SIZE - 4) / 2;
      this.player = new Tank(playerX, playerY, DIR_UP, '#ffdd44', 2.0, true, 1, 'normal');
      this.player.spawnInvincible = 90; // 重生无敌
      this.powerShotActive = false;
      this.powerShotTimer = 0;
    }
  }

  dropPowerUp(x, y) {
    // 概率掉落道具
    if (Math.random() > 0.28) return;
    const types = Object.keys(POWERUP_TYPES);
    const typeKey = types[Math.floor(Math.random() * types.length)];
    // 将道具位置对齐到格子中心
    const px = Math.floor(x / CELL_SIZE) * CELL_SIZE;
    const py = Math.floor(y / CELL_SIZE) * CELL_SIZE;
    // 确保在地图范围内
    const clampedX = Math.max(MAP_OFFSET_X, Math.min(MAP_OFFSET_X + MAP_W - CELL_SIZE, px));
    const clampedY = Math.max(MAP_OFFSET_Y, Math.min(MAP_OFFSET_Y + MAP_H - CELL_SIZE, py));
    this.powerUps.push(new PowerUp(clampedX, clampedY, typeKey));
  }

  applyPowerUp(powerUp) {
    sfxPowerUp();
    switch (powerUp.typeKey) {
      case 'EXTRA_LIFE':
        this.lives++;
        this.showMessage('生命+1!');
        break;
      case 'POWER_SHOT':
        this.powerShotActive = true;
        this.powerShotTimer = 600; // 10秒
        this.showMessage('威力强化!');
        break;
      case 'CLEAR_SCREEN':
        for (const e of this.enemies) {
          if (e.alive) {
            e.alive = false;
            this.enemiesRemaining--;
            const center = e.getCenter();
            spawnExplosion(center.x, center.y, 15);
            this.score += e.tankType === 'heavy' ? 300 : (e.tankType === 'fast' ? 200 : 100);
          }
        }
        this.showMessage('全屏清除!');
        sfxExplode();
        break;
      case 'FREEZE':
        this.freezeTimer = 420; // 7秒
        for (const e of this.enemies) {
          if (e.alive) {
            e.frozen = true;
            e.frozenTimer = this.freezeTimer;
          }
        }
        this.showMessage('敌军冻结!');
        break;
      case 'BASE_ARMOR':
        this.map.fortifyBase();
        this.map.fortifyTimer = 600; // 10秒
        this.showMessage('基地装甲!');
        break;
    }
  }

  showMessage(text) {
    this.messageText = text;
    this.messageTimer = 90;
  }

  update() {
    this.frameCount++;
    if (this.screenShake > 0) this.screenShake--;

    // 消息计时器
    if (this.messageTimer > 0) this.messageTimer--;

    // 更新粒子
    for (const p of particles) p.update();
    particles = particles.filter(p => p.alive);

    if (this.state === STATE_PLAYING) {
      this.updatePlaying();
    } else if (this.state === STATE_LEVEL_CLEAR) {
      this.levelClearTimer--;
      // 仍然更新粒子
      if (this.levelClearTimer <= 0) {
        this.level++;
        if (this.level > this.maxLevel) {
          this.state = STATE_VICTORY;
          this.gameOverTimer = 180;
        } else {
          this.loadLevel();
          this.state = STATE_PLAYING;
        }
      }
    } else if (this.state === STATE_GAME_OVER || this.state === STATE_VICTORY) {
      this.gameOverTimer--;
      if (this.gameOverTimer <= 0) {
        // 等待回车键
      }
    }
  }

  updatePlaying() {
    // 更新地图（强化计时器等）
    this.map.update();

    // 更新道具计时器
    if (this.powerShotTimer > 0) {
      this.powerShotTimer--;
      if (this.powerShotTimer <= 0) this.powerShotActive = false;
    }
    if (this.freezeTimer > 0) {
      this.freezeTimer--;
      if (this.freezeTimer <= 0) {
        for (const e of this.enemies) {
          e.frozen = false;
          e.frozenTimer = 0;
        }
      }
    }

    // 刷新敌方坦克
    this.spawnTimer--;
    if (this.spawnTimer <= 0 && this.enemiesSpawned < this.enemyConfig.total) {
      const onScreen = this.enemies.filter(e => e.alive).length;
      if (onScreen < this.enemyConfig.maxOnScreen) {
        this.spawnEnemy();
        this.spawnTimer = this.spawnDelay + Math.floor(Math.random() * 60);
      } else {
        this.spawnTimer = 15;
      }
    }

    // 更新玩家
    if (this.player.alive) {
      this.player.update(this.map, this.player);

      // 玩家输入
      let moved = false;
      const allTanks = [this.player, ...this.enemies];
      if (keys['w'] || keys['W'] || keys['ArrowUp']) {
        moved = this.player.move(DIR_UP, this.map, allTanks.filter(t => t !== this.player));
      } else if (keys['s'] || keys['S'] || keys['ArrowDown']) {
        moved = this.player.move(DIR_DOWN, this.map, allTanks.filter(t => t !== this.player));
      } else if (keys['a'] || keys['A'] || keys['ArrowLeft']) {
        moved = this.player.move(DIR_LEFT, this.map, allTanks.filter(t => t !== this.player));
      } else if (keys['d'] || keys['D'] || keys['ArrowRight']) {
        moved = this.player.move(DIR_RIGHT, this.map, allTanks.filter(t => t !== this.player));
      }

      // 射击
      if ((keys[' '] || keys['Space'] || keys['j'] || keys['J']) && this.player.shootCooldown <= 0) {
        // 检查玩家子弹数量
        const playerBullets = this.bullets.filter(b => b.isPlayer && b.alive);
        if (playerBullets.length < 1) {
          this.player.shoot(this.bullets, this.powerShotActive);
          sfxShoot();
        }
      }

      // 玩家碰到道具
      const playerBounds = this.player.getBounds();
      for (const pu of this.powerUps) {
        if (pu.collected || pu.expired) continue;
        const puBounds = { left: pu.x, right: pu.x + CELL_SIZE, top: pu.y, bottom: pu.y + CELL_SIZE };
        if (this.player.boundsOverlap(playerBounds, puBounds)) {
          pu.collected = true;
          this.applyPowerUp(pu);
        }
      }
    }

    // 更新敌方坦克
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;
      enemy.update(this.map, this.player);

      if (enemy.frozen) continue;

      // 敌方AI
      this.updateEnemyAI(enemy);

      // 敌方射击
      if (enemy.shootCooldown <= 0) {
        const enemyBullets = this.bullets.filter(b => !b.isPlayer && b.alive);
        // 每个敌方坦克最多1发子弹
        const myBullets = this.bullets.filter(b => !b.isPlayer && b.alive && b._owner === enemy);
        if (myBullets.length < 1 && Math.random() < 0.02) {
          const bullet = enemy.shoot(this.bullets, false);
          if (bullet) {
            bullet._owner = enemy;
            sfxShoot();
          }
        }
      }
    }

    // 更新子弹
    for (const bullet of this.bullets) {
      if (!bullet.alive) continue;
      bullet.update();
      if (!bullet.alive) continue;

      // 子弹与墙壁碰撞
      this.handleBulletWallCollision(bullet);
      if (!bullet.alive) continue;

      // 子弹与坦克碰撞
      if (bullet.isPlayer) {
        // 玩家子弹打敌方
        for (const enemy of this.enemies) {
          if (!enemy.alive) continue;
          if (this.player && this.player.boundsOverlap(bullet.getBounds(), enemy.getBounds())) {
            bullet.alive = false;
            const destroyed = enemy.takeDamage(this.map);
            if (destroyed) {
              const points = enemy.tankType === 'heavy' ? 300 : (enemy.tankType === 'fast' ? 200 : 100);
              this.score += points;
              this.enemiesRemaining--;
              this.dropPowerUp(enemy.getCenter().x, enemy.getCenter().y);
              // 检查通关
              if (this.enemiesRemaining <= 0 && this.enemiesSpawned >= this.enemyConfig.total) {
                this.onLevelClear();
              }
            }
            break;
          }
        }
      } else {
        // 敌方子弹打玩家
        if (this.player && this.player.alive && this.player.boundsOverlap(bullet.getBounds(), this.player.getBounds())) {
          bullet.alive = false;
          this.player.alive = false;
          spawnExplosion(this.player.getCenter().x, this.player.getCenter().y, 20);
          sfxExplode();
          this.onPlayerDeath();
        }
      }
    }

    // 清理死子弹
    this.bullets = this.bullets.filter(b => b.alive);
    // 清理死敌人
    this.enemies = this.enemies.filter(e => e.alive || e.spawnInvincible > 0);

    // 更新道具
    for (const pu of this.powerUps) {
      pu.update();
    }
    // 清理过期/已收集道具
    this.powerUps = this.powerUps.filter(p => !p.expired && !p.collected);

    // 检查：敌方坦克是否与玩家碰撞
    if (this.player && this.player.alive) {
      const pb = this.player.getBounds();
      for (const enemy of this.enemies) {
        if (!enemy.alive) continue;
        if (this.player.boundsOverlap(pb, enemy.getBounds())) {
          // 推开玩家或造成伤害（简化：阻止移动已在move中处理）
        }
      }
    }

    // 检查所有敌方被消灭（包括已全部刷新）
    if (this.enemiesRemaining <= 0 && this.enemiesSpawned >= this.enemyConfig.total) {
      const aliveEnemies = this.enemies.filter(e => e.alive);
      if (aliveEnemies.length === 0) {
        this.onLevelClear();
      }
    }

    // 清理一次性按键
    // (空格等自动重复由shootCooldown控制，不需要额外处理)
  }

  onLevelClear() {
    if (this.state !== STATE_PLAYING) return;
    this.state = STATE_LEVEL_CLEAR;
    this.levelClearTimer = 120;
    this.bullets = [];
    this.powerUps = [];
    this.showMessage(`第 ${this.level} 关通过!`);
    sfxLevelClear();
  }

  updateEnemyAI(enemy) {
    if (enemy.frozen) return;

    enemy.aiDirTimer--;
    const basePos = this.map.getBasePosition();
    const basePixelX = MAP_OFFSET_X + basePos.col * CELL_SIZE + CELL_SIZE / 2;
    const basePixelY = MAP_OFFSET_Y + basePos.row * CELL_SIZE + CELL_SIZE / 2;
    const ec = enemy.getCenter();
    const dx = basePixelX - ec.x;
    const dy = basePixelY - ec.y;

    // 检查前方是否有障碍
    const aheadBounds = { ...enemy.getBounds() };
    const lookAhead = enemy.speed * 3;
    switch (enemy.dir) {
      case DIR_UP:    aheadBounds.top -= lookAhead; aheadBounds.bottom -= lookAhead; break;
      case DIR_DOWN:  aheadBounds.top += lookAhead; aheadBounds.bottom += lookAhead; break;
      case DIR_LEFT:  aheadBounds.left -= lookAhead; aheadBounds.right -= lookAhead; break;
      case DIR_RIGHT: aheadBounds.left += lookAhead; aheadBounds.right += lookAhead; break;
    }
    const blocked = this.map.collidesWithWall(aheadBounds) ||
      this.enemies.some(e => e !== enemy && e.alive && enemy.boundsOverlap(aheadBounds, e.getBounds())) ||
      (this.player && this.player.alive && enemy.boundsOverlap(aheadBounds, this.player.getBounds()));

    if (blocked || enemy.aiDirTimer <= 0) {
      // 选择新方向
      const preferredDirs = [];
      // 偏向基地方向
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) { preferredDirs.push(DIR_RIGHT); preferredDirs.push(DIR_DOWN); preferredDirs.push(DIR_UP); preferredDirs.push(DIR_LEFT); }
        else { preferredDirs.push(DIR_LEFT); preferredDirs.push(DIR_DOWN); preferredDirs.push(DIR_UP); preferredDirs.push(DIR_RIGHT); }
      } else {
        if (dy > 0) { preferredDirs.push(DIR_DOWN); preferredDirs.push(DIR_RIGHT); preferredDirs.push(DIR_LEFT); preferredDirs.push(DIR_UP); }
        else { preferredDirs.push(DIR_UP); preferredDirs.push(DIR_RIGHT); preferredDirs.push(DIR_LEFT); preferredDirs.push(DIR_DOWN); }
      }

      // 随机打乱后两个方向
      if (Math.random() < 0.3) {
        const tmp = preferredDirs[2];
        preferredDirs[2] = preferredDirs[3];
        preferredDirs[3] = tmp;
      }

      // 尝试移动
      const allTanks = this.player ? [this.player, ...this.enemies] : [...this.enemies];
      const oldX = enemy.x, oldY = enemy.y, oldDir = enemy.dir;
      let moved = false;
      for (const dir of preferredDirs) {
        if (dir === oldDir && blocked) continue;
        enemy.dir = dir;
        moved = enemy.move(dir, this.map, allTanks.filter(t => t !== enemy));
        if (moved) break;
        // 恢复并尝试下一个方向
        enemy.x = oldX;
        enemy.y = oldY;
        enemy.dir = oldDir;
      }
      enemy.aiDirTimer = enemy.tankType === 'fast' ? (30 + Math.floor(Math.random() * 40)) :
                          (enemy.tankType === 'heavy' ? (80 + Math.floor(Math.random() * 60)) :
                          (50 + Math.floor(Math.random() * 70)));
    } else {
      // 沿当前方向移动
      const allTanks = this.player ? [this.player, ...this.enemies] : [...this.enemies];
      enemy.move(enemy.dir, this.map, allTanks.filter(t => t !== enemy));
    }
  }

  draw() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // 屏幕震动偏移
    let shakeX = 0, shakeY = 0;
    if (this.screenShake > 0) {
      shakeX = (Math.random() - 0.5) * this.screenShake * 0.5;
      shakeY = (Math.random() - 0.5) * this.screenShake * 0.5;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // 绘制UI背景
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, CANVAS_W, UI_HEIGHT);

    // 绘制地图（底层：地面和水域，墙壁）
    this.map.draw(ctx, false);

    // 绘制道具（在坦克下方）
    for (const pu of this.powerUps) {
      pu.draw(ctx);
    }

    // 绘制敌方坦克
    for (const enemy of this.enemies) {
      if (enemy.alive) enemy.draw(ctx);
    }

    // 绘制玩家坦克
    if (this.player && this.player.alive) {
      this.player.draw(ctx);
    }

    // 绘制子弹
    for (const bullet of this.bullets) {
      if (bullet.alive) bullet.draw(ctx);
    }

    // 绘制草地覆盖层（在坦克上方）
    this.map.draw(ctx, true);

    // 绘制粒子
    for (const p of particles) {
      p.draw(ctx);
    }

    ctx.restore();

    // 绘制UI信息栏
    this.drawUI();

    // 绘制消息
    if (this.messageTimer > 0 && this.messageText) {
      const alpha = Math.min(1, this.messageTimer / 30);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.font = 'bold 16px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillText(this.messageText, CANVAS_W / 2, UI_HEIGHT + MAP_H / 2 - 30);
      ctx.textAlign = 'start';
    }

    // 绘制覆盖层（菜单、暂停、结算等）
    if (this.state === STATE_MENU) {
      this.drawMenu();
    } else if (this.state === STATE_PAUSED) {
      this.drawPauseOverlay();
    } else if (this.state === STATE_LEVEL_CLEAR) {
      this.drawLevelClearOverlay();
    } else if (this.state === STATE_GAME_OVER) {
      this.drawGameOverOverlay();
    } else if (this.state === STATE_VICTORY) {
      this.drawVictoryOverlay();
    }
  }

  drawUI() {
    // 顶部信息栏背景
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(0, 0, CANVAS_W, UI_HEIGHT);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, UI_HEIGHT);
    ctx.lineTo(CANVAS_W, UI_HEIGHT);
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px "Courier New"';
    ctx.textAlign = 'left';

    // 分数
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(`SCORE`, 8, 16);
    ctx.fillStyle = '#fff';
    ctx.fillText(`${this.score}`, 8, 34);

    // 生命
    ctx.fillStyle = '#ff4466';
    ctx.fillText(`LIVES`, 100, 16);
    ctx.fillStyle = '#fff';
    ctx.fillText(`${'♥'.repeat(Math.max(0, this.lives))}`, 100, 34);

    // 关卡
    ctx.fillStyle = '#44ddff';
    ctx.fillText(`STAGE`, 190, 16);
    ctx.fillStyle = '#fff';
    ctx.fillText(`${this.level}`, 190, 34);

    // 剩余敌人
    ctx.fillStyle = '#ff6644';
    ctx.fillText(`ENEMIES`, 260, 16);
    ctx.fillStyle = '#fff';
    ctx.fillText(`${this.enemiesRemaining}`, 260, 34);

    // 道具状态
    let statusX = 360;
    if (this.powerShotActive) {
      ctx.fillStyle = '#ffaa00';
      ctx.fillText('POWER', statusX, 16);
      ctx.fillText(`${Math.ceil(this.powerShotTimer / 60)}s`, statusX, 34);
      statusX += 70;
    }
    if (this.freezeTimer > 0) {
      ctx.fillStyle = '#88ccff';
      ctx.fillText('FREEZE', statusX, 16);
      ctx.fillText(`${Math.ceil(this.freezeTimer / 60)}s`, statusX, 34);
      statusX += 70;
    }
    if (this.map.fortifyTimer > 0) {
      ctx.fillStyle = '#44ff44';
      ctx.fillText('ARMOR', statusX, 16);
      ctx.fillText(`${Math.ceil(this.map.fortifyTimer / 60)}s`, statusX, 34);
    }

    ctx.textAlign = 'start';
  }

  drawMenu() {
    // 半透明覆盖
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    const cx = CANVAS_W / 2;
    const cy = CANVAS_H / 2;

    // 标题
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 32px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('坦 克 大 战', cx, cy - 80);

    ctx.fillStyle = '#ff8800';
    ctx.font = 'bold 16px "Courier New"';
    ctx.fillText('TANK BATTLE', cx, cy - 52);

    // 坦克像素画
    this.drawTitleTank(cx, cy - 10);

    // 开始提示
    const blink = Math.floor(this.frameCount / 40) % 2;
    if (blink) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px "Courier New"';
      ctx.fillText('按 ENTER 开始游戏', cx, cy + 55);
    }

    // 操作说明
    ctx.fillStyle = '#aaa';
    ctx.font = '12px "Courier New"';
    ctx.fillText('WASD / 方向键 - 移动', cx, cy + 85);
    ctx.fillText('空格键 - 射击    P - 暂停', cx, cy + 102);
    ctx.fillText('消灭所有敌方坦克 保护基地!', cx, cy + 124);

    ctx.textAlign = 'start';
  }

  drawTitleTank(cx, cy) {
    // 简单像素坦克绘制在标题画面
    const s = 40;
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(cx - s/2 + 5, cy - s/2 + 8, s - 10, s - 14);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - s/2, cy - s/2, s, 6);
    ctx.fillRect(cx - s/2, cy + s/2 - 6, s, 6);
    ctx.fillStyle = '#cc9900';
    ctx.fillRect(cx - 8, cy - 8, 16, 16);
    ctx.fillStyle = '#664400';
    ctx.fillRect(cx - 3, cy - s/2 - 4, 6, s/2);
  }

  drawPauseOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('暂  停', CANVAS_W / 2, CANVAS_H / 2);
    ctx.font = '14px "Courier New"';
    ctx.fillText('按 P 继续', CANVAS_W / 2, CANVAS_H / 2 + 30);
    ctx.textAlign = 'start';
  }

  drawLevelClearOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 22px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(`第 ${this.level} 关通过!`, CANVAS_W / 2, CANVAS_H / 2);
    ctx.fillStyle = '#fff';
    ctx.font = '14px "Courier New"';
    ctx.fillText('准备下一关...', CANVAS_W / 2, CANVAS_H / 2 + 30);
    ctx.textAlign = 'start';
  }

  drawGameOverOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 26px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('游 戏 结 束', CANVAS_W / 2, CANVAS_H / 2 - 15);
    ctx.fillStyle = '#fff';
    ctx.font = '16px "Courier New"';
    ctx.fillText(`最终得分: ${this.score}`, CANVAS_W / 2, CANVAS_H / 2 + 25);
    ctx.font = '14px "Courier New"';
    const blink = Math.floor(this.frameCount / 40) % 2;
    if (blink) {
      ctx.fillText('按 ENTER 重新开始', CANVAS_W / 2, CANVAS_H / 2 + 55);
    }
    ctx.textAlign = 'start';
  }

  drawVictoryOverlay() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 28px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('🎖 胜 利 🎖', CANVAS_W / 2, CANVAS_H / 2 - 15);
    ctx.fillStyle = '#fff';
    ctx.font = '16px "Courier New"';
    ctx.fillText(`最终得分: ${this.score}`, CANVAS_W / 2, CANVAS_H / 2 + 25);
    ctx.font = '14px "Courier New"';
    const blink = Math.floor(this.frameCount / 40) % 2;
    if (blink) {
      ctx.fillText('按 ENTER 重新开始', CANVAS_W / 2, CANVAS_H / 2 + 55);
    }
    ctx.textAlign = 'start';
  }

  handleInput() {
    // P键暂停
    if (this.state === STATE_PLAYING && keys['p'] && !this._pWasDown) {
      this.state = STATE_PAUSED;
      this._pWasDown = true;
    } else if (this.state === STATE_PAUSED && keys['p'] && !this._pWasDown) {
      this.state = STATE_PLAYING;
      this._pWasDown = true;
    } else if (!keys['p'] && !keys['P']) {
      this._pWasDown = false;
    }

    // 回车键
    if (keys['Enter']) {
      if (this.state === STATE_MENU) {
        this.startGame();
        keys['Enter'] = false;
      } else if ((this.state === STATE_GAME_OVER || this.state === STATE_VICTORY) && this.gameOverTimer <= 0) {
        this.startGame();
        keys['Enter'] = false;
      }
    }
  }
}

// ---- 主循环 ----
const game = new Game();

function gameLoop() {
  game.handleInput();
  game.update();
  game.draw();
  requestAnimationFrame(gameLoop);
}

// 初始启动
game.state = STATE_MENU;
game.map = new Map(generateLevelLayout(1));
game.frameCount = 0;

// 点击canvas初始化音频
canvas.addEventListener('click', () => initAudio(), { once: true });

gameLoop();

console.log('🎮 坦克大战已就绪！');
console.log('操作：WASD/方向键移动 | 空格射击 | P暂停 | Enter开始/重新开始');
console.log('目标：消灭所有敌方坦克，保护基地（老鹰标志）！');
</script>
